name: Sync DRE Marketplaces

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *' # rodar diariamente às 03:00 UTC

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: npm run update

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dre_marketplaces_data.json dre_marketplaces_1.html
          git diff --quiet || (git commit -m "Automação de DRE: atualiza dados" && git push)
